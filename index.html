<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAP — Bureau Uccle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #1a365d;
            --primary-light: #2b6cb0;
            --accent: #ed8936;
            --accent-hover: #dd6b20;
            --bg: #f7fafc;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --green: #48bb78;
            --blue: #4299e1;
            --yellow: #ecc94b;
            --red: #fc8181;
            --purple: #b794f4;
            --gray: #a0aec0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header h1 {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .header h1 span { color: var(--accent); }

        /* Week navigation */
        .week-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .week-nav button {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .week-nav button:hover { background: rgba(255,255,255,0.3); }

        .btn-today {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
            font-size: 0.7rem !important;
            font-weight: 700;
            padding: 0 8px;
            letter-spacing: 0.3px;
        }

        .btn-today:hover { background: var(--accent-hover) !important; }

        .week-label { font-weight: 600; min-width: 160px; text-align: center; }

        .day-tab.is-today {
            box-shadow: inset 0 -2px 0 var(--accent);
        }

        /* Day tabs */
        .day-tabs {
            display: flex;
            gap: 2px;
            background: rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 3px;
        }

        .day-tab {
            padding: 6px 14px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.15s;
            font-family: inherit;
        }

        .day-tab:hover { color: white; background: rgba(255,255,255,0.1); }
        .day-tab.active { background: var(--accent); color: white; }

        /* AM/PM toggle */
        .ampm-toggle {
            display: flex;
            background: rgba(0,0,0,0.15);
            border-radius: 6px;
            padding: 3px;
        }

        .ampm-btn {
            padding: 5px 12px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            font-family: inherit;
            transition: all 0.15s;
        }

        .ampm-btn.active { background: white; color: var(--primary); }

        /* View toggle */
        .view-toggle {
            display: flex;
            background: rgba(0,0,0,0.15);
            border-radius: 6px;
            padding: 3px;
        }

        .view-btn {
            padding: 5px 12px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            font-family: inherit;
            transition: all 0.15s;
        }

        .view-btn.active { background: white; color: var(--primary); }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 10px 24px;
            background: white;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
        }

        .stat-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        .stat-count {
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label { color: var(--text-light); }

        /* ===== MAIN LAYOUT ===== */
        .main-layout {
            display: flex;
            height: calc(100vh - 120px);
            overflow: hidden;
        }

        /* ===== PLAN VIEW ===== */
        .plan-container {
            flex: 1;
            overflow: auto;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .office-floor {
            position: relative;
            width: 960px;
            height: 660px;
            background: #e8e0d4;
            border: 3px solid #8a7b6b;
            border-radius: 4px;
            image-rendering: pixelated;
            flex-shrink: 0;
        }

        /* Pixel grid overlay */
        .office-floor::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 16px 16px;
            pointer-events: none;
            z-index: 0;
        }

        /* Room */
        .room {
            position: absolute;
            border: 3px solid #8a7b6b;
            border-radius: 2px;
            z-index: 1;
        }

        .room-floor-openspace { background: #f5efe6; }
        .room-floor-direction { background: #e6eef5; }
        .room-floor-reunion { background: #f0e6f5; }
        .room-floor-cuisine { background: #e6f5eb; }
        .room-floor-accueil { background: #f5f0e6; }
        .room-floor-couloir { background: #ede8df; }

        .room-title {
            position: absolute;
            top: 4px;
            left: 8px;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #8a7b6b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 2;
            pointer-events: none;
        }

        /* Door */
        .door {
            position: absolute;
            z-index: 3;
        }

        .door-h {
            width: 32px;
            height: 6px;
            background: #c4956a;
            border: 1px solid #a07850;
            border-radius: 1px;
        }

        .door-v {
            width: 6px;
            height: 32px;
            background: #c4956a;
            border: 1px solid #a07850;
            border-radius: 1px;
        }

        /* Window */
        .window {
            position: absolute;
            z-index: 2;
        }

        .window-h {
            height: 5px;
            background: linear-gradient(180deg, #87ceeb, #6bb5d6);
            border: 1px solid #8a7b6b;
        }

        .window-v {
            width: 5px;
            background: linear-gradient(90deg, #87ceeb, #6bb5d6);
            border: 1px solid #8a7b6b;
        }

        /* Pixel desk */
        .desk-unit {
            position: absolute;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .desk-unit:hover { transform: scale(1.08); z-index: 20; }
        .desk-unit.highlighted { transform: scale(1.12); z-index: 25; }
        .desk-unit.highlighted .desk-box { box-shadow: 0 0 0 3px var(--accent), 0 0 12px rgba(237,137,54,0.4); }
        .desk-unit.dimmed { opacity: 0.25; pointer-events: none; }

        .desk-box {
            width: 56px;
            height: 36px;
            background: #c4a265;
            border: 2px solid #a08050;
            border-radius: 2px;
            position: relative;
            image-rendering: pixelated;
            transition: box-shadow 0.15s;
        }

        .desk-box.libre {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e0 100%);
            border: 2px dashed #a0aec0;
            position: relative;
        }

        .desk-unit.is-libre {
            cursor: pointer;
        }

        .desk-unit.is-libre .desk-box {
            animation: pulse-libre 2s ease-in-out infinite;
        }

        .desk-unit.is-libre:hover .desk-box {
            background: linear-gradient(135deg, #c6f6d5 0%, #9ae6b4 100%);
            border-color: var(--green);
            animation: none;
            box-shadow: 0 0 0 3px rgba(72,187,120,0.3), 0 4px 12px rgba(72,187,120,0.2);
            transform: scale(1.02);
        }

        .desk-unit.is-libre:hover .libre-badge {
            background: var(--green);
            color: white;
        }

        @keyframes pulse-libre {
            0%, 100% { box-shadow: 0 0 0 0 rgba(66,153,225,0.0); }
            50% { box-shadow: 0 0 0 4px rgba(66,153,225,0.15); }
        }

        .libre-badge {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--primary-light);
            background: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 6px;
            padding: 1px 6px;
            white-space: nowrap;
            transition: all 0.15s;
            pointer-events: none;
        }

        .libre-plus {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 300;
            color: #a0aec0;
            pointer-events: none;
            transition: all 0.15s;
            z-index: 5;
        }

        .desk-unit.is-libre:hover .libre-plus {
            color: var(--green);
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* Screen on desk */
        .desk-screen {
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 14px;
            background: #2d2d2d;
            border: 2px solid #444;
            border-radius: 1px;
        }

        .desk-screen-glow {
            position: absolute;
            inset: 2px;
            background: #4a90d9;
            border-radius: 1px;
        }

        .desk-screen-glow.off { background: #555; }

        .desk-screen-stand {
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 3px;
            background: #444;
        }

        /* Keyboard */
        .desk-keyboard {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 6px;
            background: #ddd;
            border: 1px solid #bbb;
            border-radius: 1px;
        }

        /* Pixel character */
        .pixel-char {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: -8px;
            z-index: 12;
            width: 24px;
            height: 32px;
        }

        .pixel-char.hidden { display: none; }

        .char-hair {
            position: absolute;
            top: 0;
            left: 3px;
            width: 18px;
            height: 8px;
            border-radius: 4px 4px 0 0;
        }

        .char-head {
            position: absolute;
            top: 4px;
            left: 5px;
            width: 14px;
            height: 12px;
            background: #f5d0a0;
            border: 1px solid #d4a870;
            border-radius: 2px;
        }

        .char-body {
            position: absolute;
            top: 16px;
            left: 3px;
            width: 18px;
            height: 10px;
            border-radius: 2px 2px 0 0;
        }

        .char-legs {
            position: absolute;
            top: 26px;
            left: 5px;
            width: 14px;
            height: 6px;
            background: #3d3d5c;
            border-radius: 0 0 2px 2px;
        }

        /* Status bubble */
        .status-bubble {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid white;
            z-index: 15;
        }

        .bubble-bureau { background: var(--green); }
        .bubble-teletravail { background: var(--blue); }
        .bubble-autre { background: var(--yellow); }
        .bubble-conge { background: var(--red); }
        .bubble-indisponible { background: var(--purple); }
        .bubble-libre { background: var(--gray); }

        /* ===== WALKING LAYER & ANIMATIONS ===== */
        #walkingLayer {
            position: absolute;
            inset: 0;
            z-index: 14;
            pointer-events: none;
        }

        .walker {
            position: absolute;
            width: 24px;
            height: 32px;
            z-index: 14;
            pointer-events: none;
        }

        .walker.face-left {
            transform: scaleX(-1);
        }

        /* Walking: body bounce */
        .walker.walking .char-body,
        .walker.walking .char-head,
        .walker.walking .char-hair {
            animation: walker-bounce 0.3s steps(2) infinite;
        }

        @keyframes walker-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-1px); }
        }

        /* Walking: leg step */
        .walker.walking .char-legs {
            animation: walker-legs 0.3s steps(2) infinite;
        }

        @keyframes walker-legs {
            0%, 100% { clip-path: inset(0 50% 0 0); }
            50% { clip-path: inset(0 0 0 50%); }
        }

        /* Idle at destination: subtle sway */
        .walker.idle .char-body {
            animation: walker-idle 2s ease-in-out infinite;
        }

        @keyframes walker-idle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-0.5px); }
        }

        /* Thought bubble emoji above idle walker */
        .walker-bubble {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            line-height: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .walker.idle .walker-bubble {
            opacity: 1;
        }

        /* Desk label */
        .desk-label {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 2px;
            font-family: 'Press Start 2P', monospace;
            font-size: 5px;
            color: #6b5b4b;
            white-space: nowrap;
            text-align: center;
            pointer-events: none;
            z-index: 11;
        }

        .desk-number {
            display: block;
            font-size: 4px;
            color: #999;
            margin-top: 1px;
        }

        /* Furniture */
        .furniture {
            position: absolute;
            z-index: 5;
            pointer-events: none;
            image-rendering: pixelated;
        }

        .meeting-table {
            background: #8B6914;
            border: 2px solid #6B4F10;
            border-radius: 6px;
        }

        .meeting-chair {
            width: 10px;
            height: 10px;
            background: #555;
            border: 1px solid #444;
            border-radius: 2px;
        }

        .plant-pixel {
            width: 16px;
            height: 22px;
            position: relative;
        }

        .plant-leaves-px {
            width: 16px;
            height: 14px;
            background: #38a169;
            border-radius: 50%;
            position: absolute;
            top: 0;
        }

        .plant-pot-px {
            width: 12px;
            height: 10px;
            background: #a0522d;
            border-radius: 0 0 3px 3px;
            position: absolute;
            bottom: 0;
            left: 2px;
        }

        .printer-px {
            width: 28px;
            height: 20px;
            background: #e2e2e2;
            border: 2px solid #ccc;
            border-radius: 2px;
            position: relative;
        }

        .printer-slot {
            position: absolute;
            bottom: 3px;
            left: 3px;
            right: 3px;
            height: 3px;
            background: white;
            border: 1px solid #ddd;
        }

        .coffee-machine-px {
            width: 18px;
            height: 24px;
            background: #444;
            border: 2px solid #333;
            border-radius: 2px 2px 0 0;
        }

        .coffee-top {
            width: 14px;
            height: 8px;
            background: #e94560;
            border-radius: 2px;
            margin: 3px auto 0;
        }

        .kitchen-counter {
            background: #b8a080;
            border: 2px solid #9a8060;
            border-radius: 2px;
        }

        .sofa-px {
            background: #6b8cae;
            border: 2px solid #5a7a9a;
            border-radius: 4px;
        }

        /* Phone icon for appels */
        .phone-icon {
            position: absolute;
            top: -4px;
            left: -6px;
            font-size: 8px;
            z-index: 16;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: white;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-section {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
            margin-bottom: 10px;
        }

        .sidebar-filter {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .sf-btn {
            padding: 3px 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: white;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--text-light);
            font-family: inherit;
            transition: all 0.15s;
        }

        .sf-btn:hover { border-color: var(--primary-light); color: var(--primary); }
        .sf-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .collab-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .collab-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.1s;
            font-size: 0.8rem;
        }

        .collab-item:hover { background: #f0f4f8; }
        .collab-item.active { background: #ebf4ff; }

        .collab-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .collab-name {
            flex: 1;
            font-weight: 500;
            font-size: 0.78rem;
        }

        .collab-status {
            font-size: 0.65rem;
            color: var(--text-light);
        }

        /* Appels section */
        .appel-list { display: flex; flex-direction: column; gap: 3px; }

        .appel-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            padding: 3px 0;
        }

        .appel-prio { color: var(--accent); font-weight: 700; }
        .appel-sec { color: var(--text-light); }

        .badge-non-confirme {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ed8936;
            color: white;
            font-size: 0.55rem;
            font-weight: 800;
            margin-left: 4px;
            vertical-align: middle;
            cursor: help;
        }

        /* Rappels section */
        .rappel-section {
            background: #fffbeb;
            border: 1px solid #f6e05e;
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 8px;
        }

        .rappel-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: #b7791f;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .rappel-count {
            background: #ed8936;
            color: white;
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 700;
        }

        .rappel-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }

        .rappel-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.73rem;
            color: #744210;
            padding: 3px 6px;
            background: rgba(237,137,54,0.08);
            border-radius: 4px;
        }

        .rappel-item .rappel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ed8936;
            animation: blink-rappel 1.5s ease-in-out infinite;
        }

        @keyframes blink-rappel {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .btn-rappel {
            display: block;
            width: 100%;
            padding: 7px 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.73rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
            text-align: center;
            text-decoration: none;
        }

        .btn-rappel:hover { background: var(--accent-hover); }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--primary);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .rappel-ok {

<script>
// ============================

// ============================
const STORAGE_KEY = 'dap_bureau_uccle_v6';

// ============================
// GOOGLE SHEETS BACKEND
// ============================
// Coller ici l'URL du déploiement Apps Script (voir google-apps-script.js)
const APPS_SCRIPT_URL = ''; // ← COLLER L'URL ICI

let isSyncing = false;
let lastSyncTime = null;
let isOnline = !!APPS_SCRIPT_URL;

// Charger les réservations depuis Google Sheets
async function loadFromSheets() {
    if (!APPS_SCRIPT_URL) return false;
    try {
        isSyncing = true;
        updateSyncStatus();
        const resp = await fetch(APPS_SCRIPT_URL);
        const json = await resp.json();
        if (json.success && json.reservations) {
            // Merge: Google Sheets est la source de vérité
            reservations = json.reservations;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(reservations));
            lastSyncTime = new Date();
            isOnline = true;
        }
        isSyncing = false;
        updateSyncStatus();
        return true;
    } catch (err) {
        console.warn('Sync lecture échouée, mode hors-ligne:', err);
        isSyncing = false;
        isOnline = false;
        updateSyncStatus();
        return false;
    }
}

// Sauvegarder une clé vers Google Sheets
async function saveToSheets(key, data) {
    if (!APPS_SCRIPT_URL) return false;
    try {
        isSyncing = true;
        updateSyncStatus();
        const resp = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ key, data }),
        });
        const json = await resp.json();
        lastSyncTime = new Date();
        isSyncing = false;
        isOnline = true;
        updateSyncStatus();
        return json.success;
    } catch (err) {
        console.warn('Sync écriture échouée, sauvegardé localement:', err);
        isSyncing = false;
        isOnline = false;
        updateSyncStatus();
        return false;
    }
}

// Indicateur de statut de synchro
function updateSyncStatus() {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    if (!APPS_SCRIPT_URL) {
        el.innerHTML = '<span style="color:#e53e3e">● Hors-ligne (localStorage)</span>';
    } else if (isSyncing) {
        el.innerHTML = '<span style="color:#ed8936">● Synchronisation...</span>';
    } else if (isOnline) {
        const time = lastSyncTime ? lastSyncTime.toLocaleTimeString('fr-BE') : '';
        el.innerHTML = `<span style="color:#38a169">● Connecté</span> <small style="color:#a0aec0">${time}</small>`;
    } else {
        el.innerHTML = '<span style="color:#e53e3e">● Hors-ligne</span>';
    }
}

// Build default slot data for a given day+period (fallback when no user reservation)
function getDefaultSlot(dayIndex, period) {
    const dayPattern = DEFAULT_PATTERNS[dayIndex];
    if (!dayPattern) return {};
    const result = {};
    DEFAULT_ASSIGNMENTS.forEach(([collabId, deskId]) => {
        const p = dayPattern[collabId];
        if (p) {
            const [status, detail] = p[period];
            result[deskId] = { person: collabId, status, detail };
        }
    });
    return result;
}

// ============================
// UTILS
// ============================
function getMonday(d) {
    const date = new Date(d);
    const day = date.getDay();
    const diff = date.getDate() - day + (day === 0 ? -6 : 1);
    date.setDate(diff);
    date.setHours(0, 0, 0, 0);
    return date;
}

function getWeekNumber(d) {
    const date = new Date(d);
    date.setHours(0, 0, 0, 0);
    date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
    const week1 = new Date(date.getFullYear(), 0, 4);
    return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function getDateKey(dayIndex, period) {
    const d = new Date(currentWeekStart);
    d.setDate(d.getDate() + dayIndex);
    return d.toISOString().slice(0, 10) + '-' + period;
}

function getReservationsForSlot(dayIndex, period) {
    const key = getDateKey(dayIndex, period);
    // If user has saved reservations for this slot, use them
    if (reservations[key]) return reservations[key];
    // Otherwise fall back to default weekly pattern
    return getDefaultSlot(dayIndex, period);
}

function setReservation(dayIndex, period, deskId, data) {
    const key = getDateKey(dayIndex, period);
    // When modifying, copy default slot first so all desks are preserved
    if (!reservations[key]) {
        reservations[key] = { ...getDefaultSlot(dayIndex, period) };
    }
    reservations[key][deskId] = data;
    save();
}

function removeReservation(dayIndex, period, deskId) {
    const key = getDateKey(dayIndex, period);
    // Copy default slot first if needed
    if (!reservations[key]) {
        reservations[key] = { ...getDefaultSlot(dayIndex, period) };
    }
    if (reservations[key]) {
        delete reservations[key][deskId];
        if (Object.keys(reservations[key]).length === 0) delete reservations[key];
    }
    save();
}

function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(reservations));
    // Sync chaque clé modifiée vers Google Sheets
    if (APPS_SCRIPT_URL) {
        const key = getDateKey(currentDayIndex, currentPeriod);
        saveToSheets(key, reservations[key]);
    }
}

function getCurrentSlotReservations() {
    return getReservationsForSlot(currentDayIndex, currentPeriod);
}

function getCollabById(id) {
    return COLLABORATEURS.find(c => c.id === id);
}

function getCollabStatus(collabId) {
    const slot = getCurrentSlotReservations();
    for (const [deskId, data] of Object.entries(slot)) {
        if (data.person === collabId) return { ...data, deskId };
    }
    return null;
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function renderHeader() {
    const wn = getWeekNumber(currentWeekStart);
    const y = currentWeekStart.getFullYear();
    const endDate = new Date(currentWeekStart);
    endDate.setDate(endDate.getDate() + 4);
    const opts = { day: 'numeric', month: 'short' };
    const startStr = currentWeekStart.toLocaleDateString('fr-BE', opts);
    const endStr = endDate.toLocaleDateString('fr-BE', opts);
    document.getElementById('weekLabel').textContent = `Sem. ${wn}/${y} (${startStr} - ${endStr})`;

    // Day tabs
    const tabs = document.getElementById('dayTabs');
    tabs.innerHTML = DAYS.map((day, i) => {
        const d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        const dateStr = d.getDate();
        const today = new Date();
        const isToday = d.toDateString() === today.toDateString();
        return `<button class="day-tab ${i === currentDayIndex ? 'active' : ''} ${isToday ? 'is-today' : ''}" onclick="setDay(${i}, this)">${DAY_SHORT[i]} ${dateStr}</button>`;
    }).join('');
}

function renderRappelSection(collabStatuses) {
    // Les collaborateurs avec bureau fixe n'ont pas besoin de confirmer
    const fixedDeskIds = new Set(DEFAULT_ASSIGNMENTS.map(([id]) => id));

    // Parmi les non-fixes, qui n'a pas de réservation explicite ?
    const key = getDateKey(currentDayIndex, currentPeriod);
    const explicitIds = new Set();
    if (reservations[key]) {
        Object.values(reservations[key]).forEach(r => {
            if (r.person) explicitIds.add(r.person);
        });
    }

    // Missing = pas de bureau fixe ET pas de réservation explicite

    if (missing.length === 0) {
        return `<div class="rappel-section" style="background:#f0fff4;border-color:#c6f6d5">
            <div class="rappel-ok">Tout le monde a confirmé son statut</div>
        </div>`;
    }

    const dayLabel = DAYS[currentDayIndex];
    const periodLabel = currentPeriod === 'am' ? 'matin' : 'après-midi';
    const dateStr = (() => {
        const d = new Date(currentWeekStart);
        d.setDate(d.getDate() + currentDayIndex);
        return d.toLocaleDateString('fr-BE', { day: 'numeric', month: 'long', year: 'numeric' });
    })();

    const names = missing.map(c => c.name).join(', ');
    const emails = missing.map(c => c.email).filter(e => e).join(',');

    const subject = encodeURIComponent(`Rappel — Merci d'indiquer votre statut pour ${dayLabel} ${dateStr}`);
    const body = encodeURIComponent(
`Bonjour,

Nous n'avons pas encore votre statut pour ${dayLabel} ${dateStr} (${periodLabel}).

Merci de mettre à jour votre présence sur l'outil de réservation des bureaux :
${window.location.href.split('?')[0]}

Les statuts possibles :
• Bureau — Vous serez présent(e) au bureau d'Uccle
• Télétravail — Vous travaillez depuis chez vous
• Autre bureau — Vous êtes dans un autre bureau (Quaregnon, Leuze, Euracor…)
• Congé — Jour de congé
• Indisponible — Autre absence

Cela permet à toute l'équipe de savoir qui est où et d'optimiser l'occupation des bureaux.

Merci !`
    );

    const mailtoLink = emails
        ? `mailto:${emails}?subject=${subject}&body=${body}`
        : `mailto:?subject=${subject}&body=${body}`;

    return `<div class="rappel-section">
        <div class="rappel-title">
            Statut manquant
            <span class="rappel-count">${missing.length}</span>
        </div>
        <div class="rappel-list">
            ${missing.map(c => `<div class="rappel-item">
                <span class="rappel-dot"></span>
                ${escapeHtml(c.name)}
            </div>`).join('')}
        </div>
        <a class="btn-rappel" href="${mailtoLink}" title="Envoyer un rappel par email">
            Envoyer un rappel (${missing.length})

    </div>`;
}

                ${dayAppels.prio.map(id => {
                    const c = getCollabById(id);
                    return c ? `<div class="appel-item appel-prio">● ${escapeHtml(c.name)}</div>` : '';
                }).join('')}
                ${dayAppels.sec.map(id => {
                    const c = getCollabById(id);
                    return c ? `<div class="appel-item appel-sec">○ ${escapeHtml(c.name)}</div>` : '';
                }).join('')}
                ${dayAppels.prio.length === 0 ? '<div style="font-size:0.72rem;color:#999">Aucune donn\u00e9e</div>' : ''}
            </div>
        </div>
        ${renderRappelSection(collabStatuses)}
    `;
}

// ============================
// RENDER: TABLE VIEW
// ============================
function renderTable() {
    const table = document.getElementById('planningTable');

    // Header: Collaborateur | Lun AM | Lun PM | Mar AM | Mar PM | ...
    let headers = '<tr><th>Collaborateur</th>';
    DAYS.forEach((day, i) => {
        const d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        const dateStr = d.getDate();
        const today = new Date();
        const isToday = d.toDateString() === today.toDateString();
        const todayClass = isToday ? ' style="background:var(--accent)"' : '';
        headers += `<th colspan="2"${todayClass}>${day} ${dateStr}</th>`;
    });
    headers += '</tr>';

    // Sub-header: AM | PM for each day
    let subHeaders = '<tr><th></th>';
    DAYS.forEach(() => {
        subHeaders += '<th style="font-size:0.65rem;padding:4px">AM</th><th style="font-size:0.65rem;padding:4px">PM</th>';
    });
    subHeaders += '</tr>';

    // Rows: one per collaborator
    let rows = '';
    COLLABORATEURS.forEach(c => {
        let cells = `<td style="font-weight:600;text-align:left;white-space:nowrap">${escapeHtml(c.name)}</td>`;
        DAYS.forEach((_, dayIdx) => {
            ['am', 'pm'].forEach(period => {
                const slot = getReservationsForSlot(dayIdx, period);
                let found = null;
                for (const [deskId, data] of Object.entries(slot)) {
                    if (data.person === c.id) { found = data; break; }
                }
                if (found) {
                    const cfg = STATUS_CONFIG[found.status] || STATUS_CONFIG.libre;
                    const cellClass = 'cell-' + found.status;
                    const label = found.status === 'autre' && found.detail ? found.detail : cfg.label;
                    cells += `<td class="${cellClass}" style="cursor:pointer;font-size:0.65rem" title="${cfg.label}${found.detail ? ' (' + found.detail + ')' : ''}">${label}</td>`;
                } else {
                    cells += '<td style="cursor:pointer;color:#cbd5e0" title="Cliquer pour réserver">—</td>';
                }
            });
        });
        rows += `<tr>${cells}</tr>`;
    });

    table.innerHTML = headers + subHeaders + rows;
}

// ============================
// MODAL
// ============================
function openModal(deskId) {
    selectedDeskId = deskId;
    const slot = getCurrentSlotReservations();
    const reservation = slot[deskId];

    document.getElementById('modalTitle').textContent = `Bureau ${deskId}`;

    // Person select — filtré par étage et bureau fixe
    const personSelect = document.getElementById('modalPerson');
    const deskInfo = DESKS.find(d => d.id === deskId);
    const deskFloor = deskInfo ? deskInfo.floor : -1;
    const isSR = (deskId === 'SR');
    const isFixedDesk = COLLABORATEURS.some(c => c.fixedDesk === deskId);
    const eligibleCollabs = COLLABORATEURS.filter(c => {
        if (isFixedDesk) return c.fixedDesk === deskId;
        if (isSR) return true;
        return !c.fixedDesk && c.floors && c.floors.includes(deskFloor);
    });
    personSelect.innerHTML = '<option value="">— Choisir —</option>' +
        eligibleCollabs.map(c => `<option value="${c.id}" ${reservation && reservation.person === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');

    // Status
    if (reservation) {
        document.getElementById('modalStatus').value = reservation.status;
        if (reservation.detail) {
            document.getElementById('modalAutreBureau').value = reservation.detail;
        }
    } else {
        document.getElementById('modalStatus').value = 'bureau';
    }

    onStatusChange();
    // Période par défaut = celle de la vue en cours
    modalPeriod = currentPeriod;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.p === currentPeriod));

    const overlay = document.getElementById('modalOverlay');
    overlay.classList.add('show');
    // Focus trap : focus sur le premier élément
    setTimeout(() => document.getElementById('modalPerson').focus(), 100);
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    selectedDeskId = null;
}

// Échap pour fermer la modal
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('show')) {
        closeModal();
    }
});

function onStatusChange() {
    const status = document.getElementById('modalStatus').value;
    document.getElementById('autreDetail').classList.toggle('show', status === 'autre');
}

function setModalPeriod(p, btn) {
    modalPeriod = p;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.p === p));
}

function reserveDesk() {
    const person = document.getElementById('modalPerson').value;
    const status = document.getElementById('modalStatus').value;
    if (!person) { alert('Veuillez choisir un collaborateur.'); return; }

    const detail = status === 'autre' ? document.getElementById('modalAutreBureau').value : null;
    const data = { person, status, detail };

    // Remove person from any other desk in the same slots
    const periods = modalPeriod === 'full' ? ['am', 'pm'] : [modalPeriod];
    periods.forEach(p => {
        const key = getDateKey(currentDayIndex, p);
        if (reservations[key]) {
            for (const [dk, d] of Object.entries(reservations[key])) {
                if (d.person === person) delete reservations[key][dk];
            }
        }
        setReservation(currentDayIndex, p, selectedDeskId, data);
    });

    closeModal();
    renderAll();
    const collabName = getCollabById(person)?.name || person;
    showToast(`${collabName} réservé(e) au bureau ${selectedDeskId}`);
}

function freeDesk() {
    if (!selectedDeskId) return;
    if (!confirm('Voulez-vous vraiment libérer ce bureau ?')) return;
    const periods = modalPeriod === 'full' ? ['am', 'pm'] : [modalPeriod];
    periods.forEach(p => removeReservation(currentDayIndex, p, selectedDeskId));
    showToast(`Bureau ${selectedDeskId} libéré`);
    closeModal();
    renderAll();
}

// Toast notification
function showToast(message) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
    }, 2500);
}

    const today = new Date();
    currentWeekStart = getMonday(today);
    const dow = today.getDay(); // 0=dim, 1=lun...

// ============================
// AMBIENT MOVEMENT — LOGIC
// ============================

function bfsPath(startWp, endWp) {
    if (startWp === endWp) return [startWp];
    const queue = [[startWp]];
    const visited = new Set([startWp]);
    while (queue.length) {
        const path = queue.shift();
        const cur = path[path.length - 1];
        for (const nb of (WAYPOINT_EDGES[cur] || [])) {
            if (nb === endWp) return [...path, nb];
            if (!visited.has(nb)) { visited.add(nb); queue.push([...path, nb]); }
        }
    }
    return null;
}

function getDeskFloorPos(deskId) {
    const d = DESKS.find(dk => dk.id === deskId);
    return d ? { x: d.x + 16, y: d.y - 28 } : null;
}

function createWalkerEl(collab) {
    const el = document.createElement('div');
    el.className = 'walker';
    el.innerHTML = `
        <div class="char-hair" style="position:absolute;top:0;left:3px;width:18px;height:8px;border-radius:4px 4px 0 0;background:${collab.hair}"></div>
        <div class="char-head" style="position:absolute;top:4px;left:5px;width:14px;height:12px;background:#f5d0a0;border:1px solid #d4a870;border-radius:2px"></div>
        <div class="char-body" style="position:absolute;top:16px;left:3px;width:18px;height:10px;border-radius:2px 2px 0 0;background:${collab.color}"></div>
        <div class="char-legs" style="position:absolute;top:26px;left:5px;width:14px;height:6px;background:#3d3d5c;border-radius:0 0 2px 2px"></div>
        <div class="walker-bubble"></div>
    `;
    return el;
}

function animateWalkerPath(walker, coords, onDone) {
    let i = 0;
    function next() {
        if (i >= coords.length) {
            walker.el.classList.remove('walking');
            walker.el.classList.add('idle');
            if (onDone) onDone();
            return;
        }
        const target = coords[i];
        const cx = parseFloat(walker.el.style.left) || 0;
        const cy = parseFloat(walker.el.style.top) || 0;
        const dx = target.x - cx;
        const dy = target.y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const ms = Math.max(200, (dist / MOVEMENT_CONFIG.walkSpeed) * 1000);

        walker.el.classList.toggle('face-left', dx < 0);
        walker.el.classList.add('walking');
        walker.el.classList.remove('idle');

        walker.el.style.transition = `left ${ms}ms linear, top ${ms}ms linear`;
        walker.el.style.left = target.x + 'px';
        walker.el.style.top = target.y + 'px';

        i++;
        walker.tid = setTimeout(next, ms + 20);
    }
    next();
}

function pickTrip(collabId, deskId) {
    const total = TRIP_TYPES.reduce((s, t) => s + t.weight, 0);
    let r = Math.random() * total;
    let trip = TRIP_TYPES[0];
    for (const t of TRIP_TYPES) { r -= t.weight; if (r <= 0) { trip = t; break; } }

    if (trip.name === 'colleague') {
        const slot = getCurrentSlotReservations();
        const myRoom = DESKS.find(d => d.id === deskId)?.room;
        const candidates = Object.entries(slot)
            .filter(([dk, data]) => data.status === 'bureau' && data.person !== collabId)
            .map(([dk]) => dk)
            .filter(dk => { const d = DESKS.find(dd => dd.id === dk); return d && d.room !== myRoom; });
        if (candidates.length) {
            const target = candidates[Math.floor(Math.random() * candidates.length)];
            return { name: 'colleague', dest: DESK_TO_DOOR[target] || 'r0_mid' };
        }
        return { name: 'coffee', dest: 'cuisine_coffee' };
    }
    return { name: trip.name, dest: trip.dest };
}

function startTrip(collabId, deskId) {
    if (activeWalkers.has(collabId) || activeWalkers.size >= MOVEMENT_CONFIG.maxWalkers) return;

    const collab = getCollabById(collabId);
    if (!collab) return;

    const startDoor = DESK_TO_DOOR[deskId];
    if (!startDoor) return;

    const trip = pickTrip(collabId, deskId);
    if (!trip.dest) return;

    const wpPath = bfsPath(startDoor, trip.dest);
    if (!wpPath) return;

    const deskPos = getDeskFloorPos(deskId);
    if (!deskPos) return;

    const goCoords = wpPath.map(wp => WAYPOINTS[wp]);

    const walkerEl = createWalkerEl(collab);
    walkerEl.style.left = deskPos.x + 'px';
    walkerEl.style.top = deskPos.y + 'px';
    document.getElementById('walkingLayer').appendChild(walkerEl);

    // Cache le personnage assis au bureau
    const deskChar = document.querySelector(`.pixel-char[data-collab-id="${collab.id}"]`);
    if (deskChar) deskChar.style.display = 'none';

    const walker = { el: walkerEl, collabId, deskId, tid: null, tid2: null };
    activeWalkers.set(collabId, walker);

    animateWalkerPath(walker, goCoords, () => {
        // Affiche l'emoji de l'activité
        const bubble = walkerEl.querySelector('.walker-bubble');
        if (bubble) bubble.textContent = TRIP_ICONS[trip.name] || '';

        const pause = MOVEMENT_CONFIG.pauseMin + Math.random() * (MOVEMENT_CONFIG.pauseMax - MOVEMENT_CONFIG.pauseMin);
        walker.tid2 = setTimeout(() => {
            walkerEl.classList.remove('idle');
            if (bubble) bubble.textContent = '';
            const returnCoords = [...goCoords].reverse();
            returnCoords.push(deskPos);
            animateWalkerPath(walker, returnCoords, () => {
                walkerEl.remove();
                activeWalkers.delete(collabId);
                const ch = document.querySelector(`.pixel-char[data-collab-id="${collab.id}"]`);
                if (ch) ch.style.display = '';
            });
        }, pause);
    });
}

function stopAllWalkers() {
    for (const [id, w] of activeWalkers) {
        clearTimeout(w.tid);
        clearTimeout(w.tid2);
        w.el.remove();
        const ch = document.querySelector(`.pixel-char[data-collab-id="${id}"]`);
        if (ch) ch.style.display = '';
    }
    activeWalkers.clear();
    clearTimeout(movementTimer);
    movementTimer = null;
}

function scheduleNextTrip() {
    if (currentView !== 'plan') return;
    const delay = MOVEMENT_CONFIG.intervalMin + Math.random() * (MOVEMENT_CONFIG.intervalMax - MOVEMENT_CONFIG.intervalMin);
    movementTimer = setTimeout(() => {
        const slot = getCurrentSlotReservations();
        const candidates = Object.entries(slot)
            .filter(([dk, data]) => data.status === 'bureau' && !activeWalkers.has(data.person))
            .map(([dk, data]) => ({ deskId: dk, collabId: data.person }));
        if (candidates.length && activeWalkers.size < MOVEMENT_CONFIG.maxWalkers) {
            const chosen = candidates[Math.floor(Math.random() * candidates.length)];
            startTrip(chosen.collabId, chosen.deskId);
        }
        scheduleNextTrip();
    }, delay);
}

function startAmbientMovement() {
    stopAllWalkers();
    scheduleNextTrip();
}

// ============================
// RENDER ALL
// ============================
function renderAll() {
    stopAllWalkers();
    renderHeader();
    renderStats();
    renderDesks();
    renderSidebar();
    if (currentView === 'table') renderTable();
    startAmbientMovement();
}

// INIT
// ============================
(async function init() {
    updateSyncStatus();
    renderAll();
    // Charger depuis Google Sheets si configuré
    if (APPS_SCRIPT_URL) {
        const ok = await loadFromSheets();
        if (ok) renderAll();
        // Rafraîchir toutes les 30 secondes
        setInterval(async () => {
            const ok = await loadFromSheets();
            if (ok) renderAll();
        }, 30000);
    }
})();
